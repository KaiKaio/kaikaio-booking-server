<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroTier Punch Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
.container { max-width: 480px; width: 100%; }
h1 { text-align: center; font-size: 20px; margin-bottom: 24px; color: #00d4ff; letter-spacing: 1px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.field select, .field input { width: 100%; padding: 8px 12px; background: #16213e; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; font-size: 14px; font-family: inherit; outline: none; }
.field select:focus, .field input:focus { border-color: #00d4ff; }
.field .auto-value { width: 100%; padding: 8px 12px; background: #16213e; border: 1px solid #333; color: #666; border-radius: 4px; font-size: 14px; font-family: inherit; }
.btn-group { display: flex; gap: 12px; margin: 20px 0; }
.btn { flex: 1; padding: 10px; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn-start { background: #00d4ff; color: #1a1a2e; }
.btn-stop { background: #e74c3c; color: #fff; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.status { padding: 10px 14px; background: #16213e; border-radius: 4px; margin-bottom: 14px; font-size: 13px; border-left: 3px solid #00d4ff; }
.status-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.logs { background: #0f0f23; border: 1px solid #333; border-radius: 4px; padding: 12px; height: 280px; overflow-y: auto; font-size: 12px; line-height: 1.8; }
.logs-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.log-line { white-space: pre-wrap; word-break: break-all; }
.log-time { color: #555; }
.log-msg { color: #e0e0e0; }
.log-msg.connected { color: #2ecc71; font-weight: bold; }
.log-msg.stopped { color: #e74c3c; }
.log-msg.timeout { color: #f39c12; }
.log-msg.started { color: #00d4ff; }
</style>
</head>
<body>
<div class="container">
  <h1>ZeroTier Punch Tool</h1>

  <div class="field">
    <label>Target Device</label>
    <select id="nodeSelect"></select>
  </div>

  <div class="field">
    <label>Probe Strategy</label>
    <div class="auto-value">Auto</div>
  </div>

  <div class="field">
    <label>Retry Interval (ms)</label>
    <input id="retryInterval" type="number" value="1000" />
  </div>

  <div class="field">
    <label>Timeout (s)</label>
    <input id="timeout" type="number" value="60" />
  </div>

  <div class="btn-group">
    <button class="btn btn-start" id="btnStart">开始探测</button>
    <button class="btn btn-stop" id="btnStop" disabled>停止</button>
  </div>

  <div class="status">
    <div class="status-label">Status</div>
    <div id="statusText">Idle</div>
  </div>

  <div class="logs-label">Logs</div>
  <div class="logs" id="logs"></div>
</div>

<script>
const nodeSelect = document.getElementById('nodeSelect');
const retryInterval = document.getElementById('retryInterval');
const timeout = document.getElementById('timeout');
const btnStart = document.getElementById('btnStart');
const btnStop = document.getElementById('btnStop');
const statusText = document.getElementById('statusText');
const logs = document.getElementById('logs');

let ws = null;

function addLog(time, message) {
  const line = document.createElement('div');
  line.className = 'log-line';
  const cls = message.toLowerCase().includes('connected') ? 'connected'
    : message.toLowerCase().includes('stopped') ? 'stopped'
    : message.toLowerCase().includes('timeout') ? 'timeout'
    : message.toLowerCase().includes('started') ? 'started' : '';
  line.innerHTML = '<span class="log-time">' + time + '</span> <span class="log-msg ' + cls + '">' + message + '</span>';
  logs.appendChild(line);
  logs.scrollTop = logs.scrollHeight;
}

function setRunning(running) {
  btnStart.disabled = running;
  btnStop.disabled = !running;
}

function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.message) {
        addLog(d.time, d.message);
      }
      if (d.status) {
        statusText.textContent = d.status;
        setRunning(d.status !== 'Idle');
      }
    } catch {}
  };
  ws.onclose = function() {
    setTimeout(connectWs, 3000);
  };
}

function fetchInitialStatus() {
  fetch('/api/punch/status').then(r => r.json()).then(d => {
    statusText.textContent = d.status;
    setRunning(d.status !== 'Idle');
  }).catch(() => {});
}

async function loadNodes() {
  const res = await fetch('/api/nodes');
  const data = await res.json();
  nodeSelect.innerHTML = '';
  data.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n.id;
    opt.textContent = n.name;
    nodeSelect.appendChild(opt);
  });
}

btnStart.addEventListener('click', async () => {
  const body = {
    nodeId: nodeSelect.value,
    retryInterval: parseInt(retryInterval.value) || undefined,
    timeout: parseInt(timeout.value) || undefined,
  };
  const res = await fetch('/api/punch/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!data.success) {
    addLog(new Date().toLocaleTimeString(), data.msg || 'Failed');
    return;
  }
  setRunning(true);
  statusText.textContent = 'Starting...';
});

btnStop.addEventListener('click', async () => {
  await fetch('/api/punch/stop', { method: 'POST' });
  setRunning(false);
  statusText.textContent = 'Idle';
});

loadNodes();
connectWs();
fetchInitialStatus();
</script>
</body>
</html>
